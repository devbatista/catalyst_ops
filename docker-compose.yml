services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-}:6379"
    restart: unless-stopped

  web:
    image: catalystops-app
    build:
      context: .
      args:
        PRECOMPILE_ASSETS: "${PRECOMPILE_ASSETS:-0}"
        ASSETS_SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
        MP_PRODUCTION_ACCESS_TOKEN: ${MP_PRODUCTION_ACCESS_TOKEN}
        MP_TEST_ACCESS_TOKEN: ${MP_TEST_ACCESS_TOKEN}
        MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
        MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
    ports:
      - "${WEB_PORT:-}:3000"
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
      RAILS_LOG_TO_STDOUT: "${RAILS_LOG_TO_STDOUT:-true}"
      RAILS_MASTER_KEY: "${RAILS_MASTER_KEY:-}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
      MP_PRODUCTION_ACCESS_TOKEN: ${MP_PRODUCTION_ACCESS_TOKEN}
      MP_TEST_ACCESS_TOKEN: ${MP_TEST_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      PRECOMPILE_ASSETS: "1"
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
    command: bin/rails server -b 0.0.0.0 -p 3000
    restart: unless-stopped

  sidekiq:
    image: catalystops-app
    # Reutiliza a mesma imagem buildada pelo serviço "web"
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: ${RAILS_ENV}
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
      RAILS_MASTER_KEY: "${RAILS_MASTER_KEY:-}"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata: