x-rails-env: &rails_env
  RAILS_ENV: ${RAILS_ENV}
  DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
  REDIS_URL: "redis://redis:6379/0"
  RAILS_MASTER_KEY: "${RAILS_MASTER_KEY:-}"
  SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
  RAILS_LOG_TO_STDOUT: "${RAILS_LOG_TO_STDOUT:-true}"
  APP_HOST: "${APP_HOST:-app.catalystops.com.br}"
  APP_PROTOCOL: "${APP_PROTOCOL:-https}"
  SMTP_ADDRESS: "${SMTP_ADDRESS:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_DOMAIN: "${SMTP_DOMAIN:-}"
  SMTP_USERNAME: "${SMTP_USERNAME:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_AUTHENTICATION: "${SMTP_AUTHENTICATION:-plain}"
  SMTP_ENABLE_STARTTLS_AUTO: "${SMTP_ENABLE_STARTTLS_AUTO:-true}"
  SMTP_OPEN_TIMEOUT: "${SMTP_OPEN_TIMEOUT:-5}"
  SMTP_READ_TIMEOUT: "${SMTP_READ_TIMEOUT:-5}"
  MP_PRODUCTION_ACCESS_TOKEN: ${MP_PRODUCTION_ACCESS_TOKEN}
  MP_TEST_ACCESS_TOKEN: ${MP_TEST_ACCESS_TOKEN}
  MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
  MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-}:6379"
    restart: unless-stopped

  web:
    image: catalystops-app
    build:
      context: .
      args:
        PRECOMPILE_ASSETS: "1"
        ASSETS_SECRET_KEY_BASE: "${SECRET_KEY_BASE:-}"
        MP_PRODUCTION_ACCESS_TOKEN: ${MP_PRODUCTION_ACCESS_TOKEN}
        MP_TEST_ACCESS_TOKEN: ${MP_TEST_ACCESS_TOKEN}
        MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
        MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
    ports:
      - "${WEB_PORT:-}:3000"
    depends_on:
      - db
      - redis
    environment:
      <<: *rails_env
    command: bin/rails server -b 0.0.0.0 -p 3000
    restart: unless-stopped

  sidekiq:
    image: catalystops-app
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - db
      - redis
    environment:
      <<: *rails_env
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
