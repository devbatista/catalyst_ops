name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MP_PRODUCTION_ACCESS_TOKEN: ${{ secrets.MP_PRODUCTION_ACCESS_TOKEN }}
          MP_TEST_ACCESS_TOKEN: ${{ secrets.MP_TEST_ACCESS_TOKEN }}
          MP_PUBLIC_KEY: ${{ secrets.MP_PUBLIC_KEY }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: MP_PRODUCTION_ACCESS_TOKEN,MP_TEST_ACCESS_TOKEN,MP_PUBLIC_KEY,MP_WEBHOOK_SECRET,RAILS_MASTER_KEY,SECRET_KEY_BASE,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,SMTP_ADDRESS,SMTP_PORT,SMTP_DOMAIN,SMTP_USERNAME,SMTP_PASSWORD
          script: |
            cd /opt/catalyst_ops
            git config --global --add safe.directory /opt/catalyst_ops
            git fetch origin main
            git checkout origin/main -- bin/deploy
            bash /opt/catalyst_ops/bin/deploy
