name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /opt/catalyst_ops
            git config --global --add safe.directory /opt/catalyst_ops
            git pull origin main

            # Cria/atualiza o .env com os secrets do GitHub Actions
            cat > .env <<EOF
            RAILS_ENV=production
            MP_PRODUCTION_ACCESS_TOKEN=${{ secrets.MP_PRODUCTION_ACCESS_TOKEN }}
            MP_TEST_ACCESS_TOKEN=${{ secrets.MP_TEST_ACCESS_TOKEN }}
            MP_PUBLIC_KEY=${{ secrets.MP_PUBLIC_KEY }}
            MP_WEBHOOK_SECRET=${{ secrets.MP_WEBHOOK_SECRET }}
            RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            PRECOMPILE_ASSETS=0
            # ...adicione outras variáveis necessárias
            EOF

            docker compose down
            docker compose up -d --build